<!doctype html>
<html>
  <head><meta charset="utf-8"><title>Refund Rejected</title></head>
  <body style="font-family:Arial,Helvetica,sans-serif;color:#222;">
    <h2>Your refund request was rejected — {{reference}}</h2>
    <p>After review, your refund for <strong>{{amount}} {{currency}}</strong> was rejected.</p>
    <p>Reason: {{notes}}</p>
    <p>Reference: <code>{{reference}}</code></p>
    <p>If you disagree, please contact: <a href="mailto:{{support_email}}">{{support_email}}</a></p>
    <hr>
    <small>CouponVerify</small>
  </body>
</html>
